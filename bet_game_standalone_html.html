<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bet Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body class="bg-slate-600">
  <div id="root"></div>

  <script type="text/javascript">
    const { useState, useEffect, useRef } = React;

    const Button = ({ children, className = "", ...props }) => (
      React.createElement("button", {
        ...props,
        className: `rounded px-3 py-2 text-sm ${className}`
      }, children)
    );

    function Dashboard() {
      const [timer, setTimer] = useState(30);
      const [balance, setBalance] = useState(() => {
        const saved = localStorage.getItem("balance");
        return saved ? JSON.parse(saved) : 1000;
      });
      const [history, setHistory] = useState(() => {
        const saved = localStorage.getItem("round_history");
        return saved ? JSON.parse(saved) : [];
      });
      const [betHistory, setBetHistory] = useState(() => {
        const saved = localStorage.getItem("bet_history");
        return saved ? JSON.parse(saved) : [];
      });
      const [betChoice, setBetChoice] = useState(null);
      const [result, setResult] = useState("");
      const [showBetPanel, setShowBetPanel] = useState(false);
      const [showAccountMenu, setShowAccountMenu] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [actionType, setActionType] = useState("");
      const [amount, setAmount] = useState("");

      useEffect(() => {
        localStorage.setItem("round_history", JSON.stringify(history));
      }, [history]);

      useEffect(() => {
        localStorage.setItem("bet_history", JSON.stringify(betHistory));
      }, [betHistory]);

      useEffect(() => {
        localStorage.setItem("balance", JSON.stringify(balance));
      }, [balance]);

      useEffect(() => {
        const interval = setInterval(() => {
          setTimer((t) => {
            if (t === 0) {
              const outcome = Math.random() < 0.5 ? "ODD" : "EVEN";

              if (betChoice) {
                const win = betChoice === outcome;
                const amt = win ? 200 : -100;

                setBalance((b) => b + amt);

                setBetHistory((prev) => [
                  {
                    choice: betChoice,
                    outcome,
                    amount: amt,
                    status: win ? "WON" : "LOST",
                    time: new Date().toLocaleString()
                  },
                  ...prev
                ]);

                setResult(win ? "You WON!" : "You LOST!");
              }

              setHistory((prev) => [
                { outcome, time: new Date().toLocaleString() },
                ...prev
              ]);

              setBetChoice(null);
              return 30;
            }
            return t - 1;
          });
        }, 1000);

        return () => clearInterval(interval);
      }, [betChoice]);

      const placeBet = (type) => {
        if (timer <= 10) return setResult("Bet closed");
        if (betChoice) return setResult("Already placed");
        if (balance < 100) return setResult("Low balance");

        setBalance((b) => b - 100);
        setBetChoice(type);
        setResult(`Bet on ${type}`);
      };

      return React.createElement("div", { className: "max-w-md mx-auto min-h-screen p-4 text-white" },
        React.createElement("div", { className: "text-center mb-3" },
          React.createElement("div", null, timer > 10 ? "Bet Now" : "Waiting results..."),
          React.createElement("div", null, timer + "s")
        ),
        React.createElement("div", { className: "flex gap-2" },
          React.createElement(Button, {
            onClick: () => placeBet("ODD"),
            className: "flex-1 bg-green-600 text-white"
          }, "ODD"),
          React.createElement(Button, {
            onClick: () => placeBet("EVEN"),
            className: "flex-1 bg-red-600 text-white"
          }, "EVEN")
        ),
        React.createElement("div", { className: "text-center mt-3" }, result),
        React.createElement("div", { className: "mt-3 bg-white text-black p-2 rounded" },
          history.map((h, i) => React.createElement("div", { key: i }, `${h.outcome} - ${h.time}`))
        )
      );
    }

    function App() {
      return React.createElement(Dashboard);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
